services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "3001:3001"
    env_file: ./api/.env
    environment:
      REDIS_URL: redis://redis:6379
      VISION_SERVICE_URL: http://vision:8000
    depends_on:
      - redis
    restart: unless-stopped

  vision:
    build: ./vision
    ports:
      - "8000:8000"
    env_file: ./vision/.env
    restart: unless-stopped

  vision-worker:
    build: ./api
    command: node dist/jobs/visionWorker.js
    env_file: ./api/.env
    environment:
      REDIS_URL: redis://redis:6379
      VISION_SERVICE_URL: http://vision:8000
    depends_on:
      - redis
      - vision
    restart: unless-stopped
