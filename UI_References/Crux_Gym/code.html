</div>
</div></div>
</div>
</section>
<!-- Gym Feed Header -->
<div class="px-6 mb-6 flex justify-between items-end">

<span class="text-[10px] font-bold text-on-surface tabular-nums" style="">142 ACTIVE</span>
</div>
</div>
<div class="flex justify-between items-start">
<div>

<p class="text-on-surface-variant text-sm mt-1" style="">0.8 miles away • Open until 11pm</p>

<span class="material-symbols-outlined text-xl" style="">arrow_forward</span>

<div class="flex justify-between items-start">

<p class="text-on-surface-variant text-sm mt-1" style="">5.1 miles away • 24/7 Access</p>

<button class="bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition-transform" style="">
