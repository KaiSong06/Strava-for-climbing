# Vision pipeline E2E test environment
#
# Spins up: local Postgres (pgvector), Redis, MinIO (S3-compatible storage),
# API, vision-worker, and a mock vision service — no ML models needed.
#
# Start:
#   docker compose -f docker-compose.test.yml up --build
#
# ── Full upload flow (with real photos) ─────────────────────────────────────
#
#   1. Login with the seeded user:
#        TOKEN=$(curl -s -X POST http://localhost:3001/auth/login \
#          -H 'Content-Type: application/json' \
#          -d '{"email":"test@example.com","password":"testpass123"}' | jq -r '.accessToken')
#
#   2. Upload photos (at least 2, JPEG or PNG):
#        curl -s -X POST http://localhost:3001/uploads \
#          -H "Authorization: Bearer $TOKEN" \
#          -F "colour=#FF0000" \
#          -F "gym_id=11111111-0000-0000-0000-000000000001" \
#          -F "photos=@photo1.jpg" \
#          -F "photos=@photo2.jpg" | jq .
#      → returns { uploadId, status: "pending" }
#
#   3. Watch the vision-worker process it:
#        docker compose -f docker-compose.test.yml logs -f vision-worker
#
#   4. Poll the upload status:
#        curl -s http://localhost:3001/uploads/<uploadId>/status \
#          -H "Authorization: Bearer $TOKEN" | jq .
#
#   Use colour=#FF0000 for auto-match, #0000FF for confirm, #00FF00 for new problem.
#
# ── Quick test (no photos needed) ───────────────────────────────────────────
#
#   ./test/enqueue-test-job.sh red     # auto-match       (score ≥ 0.92)
#   ./test/enqueue-test-job.sh blue    # awaiting_confirm  (0.75–0.91)
#   ./test/enqueue-test-job.sh green   # new problem       (< 0.75)
#
# ── Check results ───────────────────────────────────────────────────────────
#
#   docker compose -f docker-compose.test.yml exec postgres \
#     psql -U crux -d crux -c \
#     "SELECT id, processing_status, similarity_score, problem_id FROM uploads ORDER BY created_at DESC;"
#
# Ports: Postgres 5433, Redis 6380, MinIO 9000 (console 9001), mock vision 8001, API 3001

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: crux
      POSTGRES_PASSWORD: crux
      POSTGRES_DB: crux
    ports:
      - "5433:5432"
    volumes:
      - ./db/migrations:/db/migrations:ro
      - ./db/seeds:/db/seeds:ro
      - ./test/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crux -d crux"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/problems &&
      mc mb --ignore-existing local/avatars &&
      mc anonymous set download local/problems &&
      mc anonymous set download local/avatars
      "

  vision-mock:
    build: ./test/vision-mock
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://crux:crux@postgres:5432/crux
      REDIS_URL: redis://redis:6379
      JWT_SECRET: test-jwt-secret-do-not-use-in-prod
      SUPABASE_URL: http://not-used-in-test
      SUPABASE_SERVICE_ROLE_KEY: not-used-in-test
      INTERNAL_SECRET: test-internal-secret
      VISION_SERVICE_URL: http://vision-mock:8000
      DB_SSL: "false"
      PORT: "3001"
      RESEND_API_KEY: re_test_not_real
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  vision-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/api/src/jobs/visionWorker.js
    environment:
      DATABASE_URL: postgres://crux:crux@postgres:5432/crux
      REDIS_URL: redis://redis:6379
      VISION_SERVICE_URL: http://vision-mock:8000
      DB_SSL: "false"
      SIMILARITY_THRESHOLD_AUTO: "0.92"
      SIMILARITY_THRESHOLD_CONFIRM: "0.75"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vision-mock:
        condition: service_healthy

volumes:
  pgdata:
